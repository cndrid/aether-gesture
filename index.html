<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Aether Gesture - Interactive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; color: white; z-index: 10; pointer-events: none; }
        #status { font-size: 26px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,255,255,0.5); }
        .label { font-size: 10px; letter-spacing: 5px; color: #444; margin-bottom: 5px; }
        .input_video { position: fixed; bottom: 20px; left: 20px; width: 150px; transform: scaleX(-1); border-radius: 12px; opacity: 0.2; filter: grayscale(1); border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="label">INTERACTIVE LINK ACTIVE</div>
        <div id="status">SISTEM SIAP</div>
    </div>
    <video class="input_video"></video>
    <div id="container"></div>

    <script>
        let currentShape = 'sphere';
        const particleCount = 18000; 
        const spherePoints = [], heartPoints = [], textLopyuPoints = [], flowerPoints = [], flowerColors = [], photoPoints = [], photoColors = [], spreadPoints = [];
        let targetColor = new THREE.Color(0x00ffff);
        let handX = 0, handY = 0; // Koordinat tangan untuk interaksi

        function initAllShapes() {
            for (let i = 0; i < particleCount; i++) {
                const u = Math.random() * Math.PI * 2;
                const v = Math.acos((Math.random() * 2) - 1);
                spherePoints.push(2.5 * Math.sin(v) * Math.cos(u), 2.5 * Math.sin(v) * Math.sin(u), 2.5 * Math.cos(v));
                spreadPoints.push((Math.random()-0.5)*25, (Math.random()-0.5)*25, (Math.random()-0.5)*25);
                const t = Math.random() * Math.PI * 2;
                const xH = 0.22 * (16 * Math.pow(Math.sin(t), 3));
                const yH = 0.22 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                heartPoints.push(xH, yH, (Math.random() - 0.5) * 0.5);
            }

            function loadImageToParticles(src, targetCoords, targetCols) {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 300; canvas.height = 300; 
                    ctx.drawImage(img, 0, 0, 300, 300);
                    const data = ctx.getImageData(0,0,300,300).data;
                    const tempC = [], tempCol = [];
                    for(let y=0; y<300; y++) {
                        for(let x=0; x<300; x++) {
                            const i = (y*300+x)*4;
                            if(data[i+3] > 120) {
                                tempC.push((x-150)*0.03, (150-y)*0.03, 0);
                                tempCol.push(data[i]/255, data[i+1]/255, data[i+2]/255);
                            }
                        }
                    }
                    for(let i=0; i<particleCount; i++) {
                        const idx = (i % (tempC.length/3)) * 3;
                        targetCoords.push(tempC[idx], tempC[idx+1], tempC[idx+2]);
                        targetCols.push(tempCol[idx], tempCol[idx+1], tempCol[idx+2]);
                    }
                };
            }

            loadImageToParticles('foto.png', photoPoints, photoColors);
            loadImageToParticles('bunga.png', flowerPoints, flowerColors);

            // Update Teks: LOPYUUUU BANGATT
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.width = 600; tCanvas.height = 100;
            tCtx.fillStyle = 'white'; tCtx.font = 'bold 45px Arial'; tCtx.textAlign = 'center';
            tCtx.fillText('LOPYUUUU BANGATT', 300, 65);
            const tImgData = tCtx.getImageData(0,0,600,100).data;
            const tCoords = [];
            for(let y=0; y<100; y++) {
                for(let x=0; x<600; x++) {
                    if(tImgData[(y*600+x)*4] > 128) tCoords.push((x-300)*0.02, (50-y)*0.02, 0);
                }
            }
            for(let i=0; i<particleCount; i++) {
                const idx = (i % (tCoords.length/3)) * 3;
                textLopyuPoints.push(tCoords[idx], tCoords[idx+1], tCoords[idx+2]);
            }
        }
        initAllShapes();

        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.autoClearColor = false;
        document.getElementById('container').appendChild(renderer.domElement);

        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.02, color: 0x444444 })));

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particleCount*3), 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(particleCount*3), 3));
        const material = new THREE.PointsMaterial({ size: 0.03, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        camera3D.position.z = 8;

        function onResults(results) {
            const ui = document.getElementById('status');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // TRACKING KOORDINAT TANGAN (Titik 9 adalah tengah telapak tangan)
                handX = (lm[9].x - 0.5) * -10; 
                handY = (lm[9].y - 0.5) * -10;

                const check = (t, p) => lm[t].y < lm[p].y;
                const indexUp = check(8, 6), middleUp = check(12, 10), ringUp = check(16, 14), pinkyUp = check(20, 18);
                const isThumbFolded = Math.hypot(lm[4].x - lm[17].x, lm[4].y - lm[17].y) < 0.1;

                if (lm[0].y < lm[9].y) {
                    currentShape = 'spread'; ui.innerText = "VOID"; targetColor.setHex(0x333333);
                } 
                else if (indexUp && middleUp && ringUp && pinkyUp && isThumbFolded) {
                    currentShape = 'flower'; ui.innerText = "FLOWERS FOR YOU"; 
                }
                else if (indexUp && middleUp && ringUp && !pinkyUp) {
                    currentShape = 'text'; ui.innerText = "LOPYUUUU"; targetColor.setHex(0xff00ff);
                } 
                else if (indexUp && !middleUp && !ringUp) {
                    currentShape = 'photo'; ui.innerText = "DNA PATTERN";
                } 
                else if (indexUp && middleUp && !ringUp) {
                    currentShape = 'heart'; ui.innerText = "HEARTBEAT"; targetColor.setHex(0xff3366);
                } 
                else if (indexUp && middleUp && ringUp && pinkyUp && !isThumbFolded) {
                    currentShape = 'sphere'; ui.innerText = "SUPERNOVA"; targetColor.setHex(0x00ffaa);
                    particleSystem.scale.lerp(new THREE.Vector3(2.5, 2.5, 2.5), 0.1);
                } 
                else {
                    currentShape = 'sphere'; ui.innerText = "AETHER CORE"; targetColor.setHex(0x00ffff);
                    particleSystem.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        hands.onResults(onResults);
        new Camera(document.querySelector('.input_video'), { onFrame: async () => { await hands.send({image: document.querySelector('.input_video')}); }, width: 640, height: 480 }).start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.setClearColor(0x000000, 0.12);
            const pos = particleSystem.geometry.attributes.position;
            const col = particleSystem.geometry.attributes.color;
            let tP = spherePoints, tC = null;
            
            if(currentShape === 'heart') tP = heartPoints;
            if(currentShape === 'text') tP = textLopyuPoints;
            if(currentShape === 'flower') { tP = flowerPoints; tC = flowerColors; }
            if(currentShape === 'photo') { tP = photoPoints; tC = photoColors; }
            if(currentShape === 'spread') tP = spreadPoints;

            for(let i=0; i<pos.array.length; i++) {
                // Morphing ke bentuk target
                pos.array[i] += (tP[i] - pos.array[i]) * 0.08;
                
                // PARTICLE FOLLOWING: Tambahkan efek tarikan ke arah tangan
                if (i % 3 === 0) pos.array[i] += (handX - pos.array[i]) * 0.02; // X
                if (i % 3 === 1) pos.array[i] += (handY - pos.array[i]) * 0.02; // Y

                if(tC && tC.length > 0) {
                    col.array[i] += (tC[i] - col.array[i]) * 0.06;
                } else {
                    const c = (i%3===0 ? targetColor.r : (i%3===1 ? targetColor.g : targetColor.b)); 
                    col.array[i] += (c - col.array[i]) * 0.06;
                }
            }
            pos.needsUpdate = true; col.needsUpdate = true;
            particleSystem.rotation.y += 0.003;
            renderer.render(scene, camera3D);
        }
        animate();
    </script>
</body>
</html>
