<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Aether Gesture - Skripsi Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; color: white; z-index: 10; pointer-events: none; }
        #status { font-size: 26px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .label { font-size: 10px; letter-spacing: 5px; color: #444; margin-bottom: 5px; }
        .input_video { position: fixed; bottom: 20px; left: 20px; width: 150px; transform: scaleX(-1); border-radius: 12px; opacity: 0.2; filter: grayscale(1); border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="label">NEURAL LINK CONNECTED</div>
        <div id="status">SISTEM SIAP</div>
    </div>
    <video class="input_video"></video>
    <div id="container"></div>

    <script>
        let currentShape = 'sphere';
        const particleCount = 10000;
        const spherePoints = [], heartPoints = [], textLovePoints = [], textSkripsiPoints = [], photoPoints = [], photoColors = [], spreadPoints = [];
        let targetColor = new THREE.Color(0x00ffff);

        function initAllShapes() {
            for (let i = 0; i < particleCount; i++) {
                // Sphere
                const u = Math.random() * Math.PI * 2;
                const v = Math.acos((Math.random() * 2) - 1);
                spherePoints.push(2.5 * Math.sin(v) * Math.cos(u), 2.5 * Math.sin(v) * Math.sin(u), 2.5 * Math.cos(v));
                // Spread
                spreadPoints.push((Math.random()-0.5)*25, (Math.random()-0.5)*25, (Math.random()-0.5)*25);
                // Heart
                const t = Math.random() * Math.PI * 2;
                const xH = 0.22 * (16 * Math.pow(Math.sin(t), 3));
                const yH = 0.22 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                heartPoints.push(xH, yH, (Math.random() - 0.5) * 0.5);
            }

            // Text Generator Helper
            function generateTextPoints(text, size) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 600; canvas.height = 150;
                ctx.fillStyle = 'white'; ctx.font = `bold ${size}px Arial`; ctx.textAlign = 'center';
                ctx.fillText(text, 300, 85);
                const data = ctx.getImageData(0,0,600,150).data;
                const coords = [];
                for(let y=0; y<150; y++) {
                    for(let x=0; x<600; x++) {
                        if(data[(y*600+x)*4] > 128) coords.push((x-300)*0.02, (75-y)*0.02, 0);
                    }
                }
                const finalPoints = [];
                for(let i=0; i<particleCount; i++) {
                    const idx = (i % (coords.length/3)) * 3;
                    finalPoints.push(coords[idx], coords[idx+1], coords[idx+2] + (Math.random()-0.5)*0.1);
                }
                return finalPoints;
            }

            textLovePoints.push(...generateTextPoints('I LOVE YOU', 60));
            textSkripsiPoints.push(...generateTextPoints('GOOD LUCK SIDANGNYA!', 45));

            // Foto PNG
            const img = new Image();
            img.src = 'foto.png';
            img.onload = () => {
                const pCanvas = document.createElement('canvas');
                const pCtx = pCanvas.getContext('2d');
                pCanvas.width = 200; pCanvas.height = 200;
                pCtx.drawImage(img, 0, 0, 200, 200);
                const pData = pCtx.getImageData(0,0,200,200).data;
                const pCoords = [], pCols = [];
                for(let y=0; y<200; y+=2) {
                    for(let x=0; x<200; x+=2) {
                        const i = (y*200+x)*4;
                        if(pData[i+3] > 128) {
                            pCoords.push((x-100)*0.045, (100-y)*0.045, 0);
                            pCols.push(pData[i]/255, pData[i+1]/255, pData[i+2]/255);
                        }
                    }
                }
                for(let i=0; i<particleCount; i++) {
                    const idx = (i % (pCoords.length/3)) * 3;
                    photoPoints.push(pCoords[idx], pCoords[idx+1], pCoords[idx+2]);
                    photoColors.push(pCols[idx], pCols[idx+1], pCols[idx+2]);
                }
            };
        }
        initAllShapes();

        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.autoClearColor = false;
        document.getElementById('container').appendChild(renderer.domElement);

        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.02, color: 0x444444 })));

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particleCount*3), 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(particleCount*3), 3));
        const material = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        camera3D.position.z = 8;

        function onResults(results) {
            const ui = document.getElementById('status');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const check = (t, p) => lm[t].y < lm[p].y;
                const indexUp = check(8, 6), middleUp = check(12, 10), ringUp = check(16, 14), pinkyUp = check(20, 18);

                if (lm[0].y < lm[9].y) {
                    currentShape = 'spread'; ui.innerText = "VOID"; targetColor.setHex(0x333333);
                } 
                // 4 Jari: Pesan Semangat Skripsi
                else if (indexUp && middleUp && ringUp && pinkyUp && (lm[4].y > lm[3].y)) {
                    currentShape = 'skripsi'; ui.innerText = "SUPPORT MODE"; targetColor.setHex(0xffff00);
                }
                // 3 Jari: I Love You
                else if (indexUp && middleUp && ringUp && !pinkyUp) {
                    currentShape = 'text'; ui.innerText = "MESSAGE"; targetColor.setHex(0xff00ff);
                } 
                // 1 Jari: Foto
                else if (indexUp && !middleUp && !ringUp) {
                    currentShape = 'photo'; ui.innerText = "DNA PATTERN";
                } 
                // Peace: Heart
                else if (indexUp && middleUp && !ringUp) {
                    currentShape = 'heart'; ui.innerText = "HEARTBEAT"; targetColor.setHex(0xff3366);
                } 
                // 5 Jari (Telapak): Supernova
                else if (indexUp && middleUp && ringUp && pinkyUp && (lm[4].y < lm[3].y)) {
                    currentShape = 'sphere'; ui.innerText = "SUPERNOVA"; targetColor.setHex(0x00ffaa);
                    particleSystem.scale.lerp(new THREE.Vector3(2.5, 2.5, 2.5), 0.1);
                } 
                else {
                    currentShape = 'sphere'; ui.innerText = "AETHER CORE"; targetColor.setHex(0x00ffff);
                    particleSystem.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        hands.onResults(onResults);
        new Camera(document.querySelector('.input_video'), { onFrame: async () => { await hands.send({image: document.querySelector('.input_video')}); }, width: 640, height: 480 }).start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.setClearColor(0x000000, 0.12);
            const pos = particleSystem.geometry.attributes.position;
            const col = particleSystem.geometry.attributes.color;
            let tP = spherePoints;
            if(currentShape === 'heart') tP = heartPoints;
            if(currentShape === 'text') tP = textLovePoints;
            if(currentShape === 'skripsi') tP = textSkripsiPoints;
            if(currentShape === 'photo') tP = photoPoints;
            if(currentShape === 'spread') tP = spreadPoints;

            for(let i=0; i<pos.array.length; i++) {
                pos.array[i] += (tP[i] - pos.array[i]) * 0.08;
                if(currentShape === 'photo' && photoColors.length > 0) col.array[i] += (photoColors[i] - col.array[i]) * 0.06;
                else col.array[i] += ((i%3===0 ? targetColor.r : (i%3===1 ? targetColor.g : targetColor.b)) - col.array[i]) * 0.06;
            }
            pos.needsUpdate = true; col.needsUpdate = true;
            particleSystem.rotation.y += 0.003;
            renderer.render(scene, camera3D);
        }
        animate();
    </script>
</body>
</html>
